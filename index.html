<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Узату — Арайлым</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── MODERN HERO ── */
    .hero {
      min-height:100vh;
      position:relative;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .hero-wallpaper {
      position:absolute; inset:0;
      background: radial-gradient(ellipse at 30% 40%, #5B1A32 0%, #2E0A1A 40%, #0d0408 100%);
      transform:scale(1.05);
      animation:slowZoom 20s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      from { transform:scale(1.05); }
      to   { transform:scale(1.12); }
    }
    .hero-overlay {
      position:absolute; inset:0;
      background: linear-gradient(
        160deg,
        rgba(28,10,20,.85) 0%,
        rgba(61,10,28,.70) 50%,
        rgba(20,5,15,.90) 100%
      );
    }
    /* Particles */
    .particles { position:absolute; inset:0; pointer-events:none; }
    .particle {
      position:absolute; border-radius:50%;
      background:radial-gradient(circle,rgba(201,168,76,.6),transparent);
      animation:particleDrift linear infinite;
    }
    @keyframes particleDrift {
      0%   { transform:translateY(100vh) scale(0); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:.4; }
      100% { transform:translateY(-20vh) scale(1); opacity:0; }
    }

    .hero-content { position:relative; z-index:2; text-align:center; padding:0 24px; }
    .hero-eyebrow {
      font-size:.7rem; letter-spacing:.3em; text-transform:uppercase;
      color:var(--gold); font-weight:600; margin-bottom:20px;
      opacity:0; animation:fadeUp .8s .3s forwards;
    }
    .hero-name {
      font-family:'Playfair Display',serif;
      font-size:clamp(4rem,12vw,9rem);
      color:#fff; font-weight:700; line-height:1;
      margin:0 0 8px;
      opacity:0; animation:fadeUp .9s .5s forwards;
      text-shadow:0 4px 40px rgba(201,168,76,.25);
    }
    .hero-name-en {
      font-size:clamp(1rem,3vw,1.6rem);
      color:rgba(255,255,255,.35);
      font-family:'Playfair Display',serif;
      font-style:italic;
      letter-spacing:.12em;
      margin:0 0 32px;
      opacity:0; animation:fadeUp .9s .65s forwards;
    }
    .hero-rule {
      display:flex; align-items:center; gap:12px;
      justify-content:center; margin-bottom:28px;
      opacity:0; animation:fadeUp .8s .8s forwards;
    }
    .hero-rule-line { width:60px; height:1px; background:rgba(201,168,76,.4); }
    .hero-rule span { color:var(--gold); font-size:.9rem; }
    .hero-event {
      font-size:clamp(.9rem,2vw,1.1rem);
      color:rgba(255,255,255,.65);
      letter-spacing:.15em; text-transform:uppercase;
      margin:0 0 8px;
      opacity:0; animation:fadeUp .8s .95s forwards;
    }
    .hero-date {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.2rem,3vw,1.8rem);
      color:var(--gold);
      margin:0 0 44px;
      opacity:0; animation:fadeUp .8s 1.1s forwards;
    }
    .hero-btn {
      display:inline-block;
      background:linear-gradient(135deg,var(--gold),#B8941E);
      color:#1c0a14; text-decoration:none;
      font-weight:700; font-size:.9rem;
      letter-spacing:.1em; text-transform:uppercase;
      padding:16px 40px; border-radius:50px;
      transition:transform .25s, box-shadow .25s;
      opacity:0; animation:fadeUp .8s 1.25s forwards;
    }
    .hero-btn:hover { transform:translateY(-3px); box-shadow:0 12px 36px rgba(201,168,76,.4); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .hero-scroll {
      position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
      z-index:2; display:flex; flex-direction:column; align-items:center; gap:8px;
      opacity:0; animation:fadeUp .8s 1.6s forwards;
    }
    .hero-scroll-line {
      width:1px; height:48px;
      background:linear-gradient(to bottom,transparent,rgba(255,255,255,.4));
      animation:scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100%{transform:scaleY(1)}50%{transform:scaleY(.6)} }
    .hero-scroll span { font-size:.65rem; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.3); }

    /* ── MUSIC PLAYER ── */
    .music-player {
      position:fixed; bottom:24px; right:24px; z-index:1000;
      background:rgba(20,8,15,.92);
      backdrop-filter:blur(20px);
      border:1px solid rgba(201,168,76,.25);
      border-radius:20px;
      padding:14px 18px;
      display:flex; align-items:center; gap:14px;
      min-width:240px;
      box-shadow:0 8px 40px rgba(0,0,0,.5);
      transition:transform .3s;
    }
    .music-player.hidden { transform:translateY(120%); }
    .mp-album {
      width:44px; height:44px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,var(--bord),#7B1540);
      display:flex; align-items:center; justify-content:center;
      font-size:1.3rem;
      animation:spinVinyl2 4s linear infinite paused;
    }
    .mp-album.playing { animation-play-state:running; }
    @keyframes spinVinyl2 { to { transform:rotate(360deg); } }
    .mp-info { flex:1; min-width:0; }
    .mp-title  { color:#fff; font-size:.85rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mp-artist { color:var(--gold); font-size:.7rem; margin-top:2px; }
    .mp-bars {
      display:flex; align-items:flex-end; gap:2px; height:18px; flex-shrink:0;
    }
    .mp-bars span {
      display:block; width:3px; background:var(--gold); border-radius:2px;
      animation:barP 1s ease-in-out infinite alternate paused;
    }
    .mp-bars.playing span { animation-play-state:running; }
    .mp-bars span:nth-child(1){ height:6px;  animation-delay:0s; }
    .mp-bars span:nth-child(2){ height:14px; animation-delay:.15s; }
    .mp-bars span:nth-child(3){ height:9px;  animation-delay:.3s; }
    .mp-bars span:nth-child(4){ height:16px; animation-delay:.1s; }
    .mp-bars span:nth-child(5){ height:6px;  animation-delay:.25s; }
    @keyframes barP {
      from { opacity:.4; transform:scaleY(.5); }
      to   { opacity:1;  transform:scaleY(1); }
    }
    .mp-toggle {
      background:none; border:none; cursor:pointer;
      color:#fff; font-size:1.2rem; flex-shrink:0;
      width:32px; height:32px; border-radius:50%;
      background:rgba(201,168,76,.2);
      display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .mp-toggle:hover { background:rgba(201,168,76,.4); }
    .mp-close {
      background:none; border:none; cursor:pointer;
      color:rgba(255,255,255,.3); font-size:.9rem;
      padding:0; line-height:1; flex-shrink:0;
    }
    .mp-close:hover { color:#fff; }

    /* ── AUTOPLAY PROMPT ── */
    .play-prompt {
      position:fixed; inset:0; z-index:2000;
      background:rgba(20,8,15,.95);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:24px; text-align:center;
      padding:24px;
    }
    .play-prompt.hidden { display:none; }
    .pp-note { font-size:5rem; animation:ppBounce 1.5s ease-in-out infinite alternate; }
    @keyframes ppBounce { from{transform:scale(1)} to{transform:scale(1.15)} }
    .pp-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; margin:0; }
    .pp-sub   { color:rgba(255,255,255,.5); font-size:.9rem; margin:0; }
    .pp-btn {
      background:linear-gradient(135deg,var(--gold),#B8941E);
      color:#1c0a14; border:none; cursor:pointer;
      font-weight:700; font-size:1rem; letter-spacing:.1em;
      padding:16px 48px; border-radius:50px;
      transition:transform .2s, box-shadow .2s;
    }
    .pp-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(201,168,76,.4); }
  </style>
</head>
<body>


<nav class="nav" id="nav">
  <div class="nav-inner">
    <span class="nav-logo">✦ Узату</span>
    <div class="nav-links">
      <a href="invitation.html" data-i18n="nav_invitation">Приглашение</a>
      <a href="details.html"    data-i18n="nav_details">Детали</a>
      <a href="rsvp.html"       data-i18n="nav_rsvp">Подтвердить</a>

    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">KZ</button>

<section class="hero">

  <div class="particles" id="particles"></div>
  <div class="orn orn-tl"></div>
  <div class="orn orn-tr"></div>
  <div class="orn orn-bl"></div>
  <div class="orn orn-br"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">✦ Ұзату тойына шақырамыз ✦</p>
    <h1 class="hero-name">Арайлым</h1>
    <p class="hero-name-en">Arailym</p>
    <div class="hero-rule">
      <div class="hero-rule-line"></div>
      <span>✦</span>

    </div>
    <p class="hero-event" data-i18n="hero_event">на торжество Узату</p>

  <div class="footer-orn">⬥ ✦ ⬥</div>

  <nav class="footer-nav">
    <a href="invitation.html" data-i18n="nav_invitation">Приглашение</a>
    <a href="details.html"    data-i18n="nav_details">Детали</a>

  </nav>
  <a href="admin.html" class="admin-link">⚙</a>

<!-- FLOATING MUSIC PLAYER -->
<div class="music-player hidden" id="music-player">
  <div class="mp-album" id="mp-album">🎵</div>
  <div class="mp-info">
    <div class="mp-title">Махаббатым</div>
    <div class="mp-artist">AI · Ұзату 2026</div>
  </div>
  <div class="mp-bars" id="mp-bars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <button class="mp-toggle" id="mp-toggle" onclick="togglePlay()">⏸</button>
  <button class="mp-close" onclick="closePlayer()">✕</button>
</div>

<audio id="bg-audio" loop preload="none">
  <!-- Добавьте файл mahabbatym.mp3 в папку uzatu-site -->
</audio>

<script src="i18n.js"></script>
<script>
  // Nav scroll
  window.addEventListener('scroll', () => {
    document.getElementById('nav').style.background =
      window.scrollY > 60 ? 'rgba(28,10,20,.99)' : 'rgba(28,10,20,.0)';
  });
  document.addEventListener('DOMContentLoaded', applyLang);

  // Particles
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
      opacity:${Math.random()*.5+.1};
    `;
    pContainer.appendChild(p);
  }

  // Music
  const audio    = document.getElementById('bg-audio');
  const player   = document.getElementById('music-player');
  const album    = document.getElementById('mp-album');
  const bars     = document.getElementById('mp-bars');
  const toggleBtn = document.getElementById('mp-toggle');
  let playing = false;

  // Autoplay on first user interaction (browser policy)
  function tryAutoplay() {
    audio.volume = 0.45;
    audio.play().then(() => {
      playing = true;
      player.classList.remove('hidden');
      album.classList.add('playing');
      bars.classList.add('playing');
    }).catch(() => {
      // Show player but paused — user can press play
      player.classList.remove('hidden');
      toggleBtn.textContent = '▶';
    });
    document.removeEventListener('click', tryAutoplay);
    document.removeEventListener('touchstart', tryAutoplay);
  }
  document.addEventListener('click', tryAutoplay);
  document.addEventListener('touchstart', tryAutoplay);

  // Try immediate autoplay
  audio.volume = 0.45;
  audio.play().then(() => {
    playing = true;
    player.classList.remove('hidden');
    album.classList.add('playing');
    bars.classList.add('playing');
  }).catch(() => { /* wait for interaction */ });

  function togglePlay() {
    if (playing) {
      audio.pause();
      playing = false;
      album.classList.remove('playing');
      bars.classList.remove('playing');
      toggleBtn.textContent = '▶';
    } else {
      audio.play();
      playing = true;
      album.classList.add('playing');
      bars.classList.add('playing');
      toggleBtn.textContent = '⏸';
    }
  }

  function closePlayer() {
    audio.pause();
    player.classList.add('hidden');
  }
</script>
</body>
</html>
