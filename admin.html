<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Панель управления — Узату</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="admin-page">

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h2 data-i18n="login_title">Вход</h2>
    <p data-i18n="login_sub">Панель управления Узату</p>
    <input type="password" id="pwd-input" data-i18n-ph="login_ph" placeholder="Пароль"
           onkeydown="if(event.key==='Enter') doLogin()"/>
    <button onclick="doLogin()" data-i18n="login_btn">Войти</button>
    <p class="login-err" id="login-err"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-screen" id="admin-screen" style="display:none">
  <div class="admin-head">
    <h1 data-i18n="adm_title">Панель управления</h1>
    <div class="admin-head-right">
      <a href="index.html" data-i18n="adm_back">← На сайт</a>
      <button onclick="doLogout()" data-i18n="adm_logout">Выйти</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card c-all">
      <div class="stat-num" id="st-total">0</div>
      <div class="stat-label" data-i18n="adm_total">Всего ответов</div>
    </div>
    <div class="stat-card c-yes">
      <div class="stat-num" id="st-yes">0</div>
      <div class="stat-label" data-i18n="adm_yes">Придут</div>
    </div>
    <div class="stat-card c-no">
      <div class="stat-num" id="st-no">0</div>
      <div class="stat-label" data-i18n="adm_no">Не придут</div>
    </div>
    <div class="stat-card c-ppl">
      <div class="stat-num" id="st-guests">0</div>
      <div class="stat-label" data-i18n="adm_guests">Гостей всего</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" id="adm-search" data-i18n-ph="adm_search" placeholder="Поиск по имени или телефону..." oninput="renderTable()"/>
    <select id="adm-filter" onchange="renderTable()">
      <option value="" data-i18n="adm_filter_all">Все</option>
      <option value="yes" data-i18n="adm_filter_yes">Придут</option>
      <option value="no"  data-i18n="adm_filter_no">Не придут</option>
    </select>
    <button class="btn-export" onclick="exportCSV()" data-i18n="adm_export">Экспорт CSV</button>
    <button class="btn-clr" onclick="clearAll()" data-i18n="adm_clear">Очистить всё</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-i18n="adm_th_name">Имя</th>
          <th data-i18n="adm_th_phone">Телефон</th>
          <th data-i18n="adm_th_status">Статус</th>
          <th data-i18n="adm_th_guests">Гостей</th>
          <th data-i18n="adm_th_comment">Комментарий</th>
          <th data-i18n="adm_th_date">Дата</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="guests-tbody"></tbody>
    </table>
  </div>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
